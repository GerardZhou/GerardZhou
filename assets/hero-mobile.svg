<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img" aria-labelledby="title description">
  <title id="title">Gerard Zhou — Software Engineer</title>
  <desc id="description">A mobile terminal-inspired header describing work across infrastructure, backend systems, and developer tools.</desc>
  <style>
    :root { color-scheme: light dark; }
    .surface { fill: #f6f8fa; }
    .panel { fill: #ffffff; stroke: #d0d7de; }
    .grid { stroke: #d8dee4; }
    .primary { fill: #1f2328; }
    .secondary { fill: #59636e; }
    .accent { fill: #0969da; }
    .green { fill: #1a7f37; }
    .amber { fill: #9a6700; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .cursor { animation: blink 1.2s steps(1, end) infinite; }
    @keyframes blink { 0%, 46% { opacity: 1; } 47%, 100% { opacity: 0; } }
    @media (prefers-color-scheme: dark) {
      .surface { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; }
      .grid { stroke: #21262d; }
      .primary { fill: #f0f6fc; }
      .secondary { fill: #8b949e; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .amber { fill: #d29922; }
    }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }
  </style>

  <rect class="surface" width="680" height="620" rx="24" />
  <g opacity="0.5">
    <path class="grid" d="M0 100H680M0 200H680M0 300H680M0 400H680M0 500H680" />
    <path class="grid" d="M100 0V620M300 0V620M500 0V620" />
  </g>

  <g transform="translate(36 46)">
    <text class="sans accent" x="0" y="12" font-size="15" font-weight="700" letter-spacing="2.4">SOFTWARE ENGINEER</text>
    <text class="sans primary" x="0" y="70" font-size="48" font-weight="700" letter-spacing="-1.5">Gerard Zhou</text>
    <text class="sans secondary" x="0" y="108" font-size="20">Computer Science @ UT Austin</text>
    <text class="sans primary" x="0" y="156" font-size="18" font-weight="600">Infrastructure · Backend Systems</text>
    <text class="sans primary" x="0" y="184" font-size="18" font-weight="600">Developer Tools</text>
    <text class="sans secondary" x="0" y="226" font-size="16">Build carefully. Measure honestly. Ship useful systems.</text>
  </g>

  <g transform="translate(28 300)">
    <rect class="panel" width="624" height="278" rx="14" />
    <circle cx="24" cy="24" r="5" fill="#ff5f56" />
    <circle cx="42" cy="24" r="5" fill="#ffbd2e" />
    <circle cx="60" cy="24" r="5" fill="#27c93f" />
    <text class="mono secondary" x="86" y="29" font-size="14">systems.profile</text>
    <path class="grid" d="M0 48H624" />

    <text class="mono green" x="24" y="84" font-size="16">$</text>
    <text class="mono primary" x="48" y="84" font-size="16">inspect --engineer gerard</text>
    <text class="mono accent" x="24" y="126" font-size="16">infra</text>
    <text class="mono secondary" x="120" y="126" font-size="16">Kubernetes · Terraform · Cloudflare</text>
    <text class="mono accent" x="24" y="166" font-size="16">backend</text>
    <text class="mono secondary" x="120" y="166" font-size="16">Go · TypeScript · Python · Node.js</text>
    <text class="mono accent" x="24" y="206" font-size="16">quality</text>
    <text class="mono secondary" x="120" y="206" font-size="16">tests · static analysis · release safety</text>
    <text class="mono amber" x="24" y="248" font-size="16">status</text>
    <text class="mono primary" x="120" y="248" font-size="16">building reliable systems</text>
    <rect class="cursor accent" x="397" y="233" width="9" height="18" rx="1" />
  </g>
</svg>
