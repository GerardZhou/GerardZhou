<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img" aria-labelledby="title description">
  <title id="title">Gerard Zhou — Software Engineer</title>
  <desc id="description">A dark mobile terminal-inspired header describing work across backend systems, cloud infrastructure, and developer tooling.</desc>
  <style>
    .surface { fill: #0d1117; }
    .panel { fill: #161b22; stroke: #30363d; }
    .grid { stroke: #21262d; }
    .primary { fill: #f0f6fc; }
    .secondary { fill: #8b949e; }
    .accent { fill: #58a6ff; }
    .green { fill: #3fb950; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .cursor { animation: blink 1.2s steps(1, end) infinite; }
    @keyframes blink { 0%, 46% { opacity: 1; } 47%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }
  </style>

  <rect class="surface" width="680" height="620" rx="24" />
  <g opacity="0.5">
    <path class="grid" d="M0 100H680M0 200H680M0 300H680M0 400H680M0 500H680" />
    <path class="grid" d="M100 0V620M300 0V620M500 0V620" />
  </g>

  <g transform="translate(36 46)">
    <text class="sans accent" x="0" y="12" font-size="15" font-weight="700" letter-spacing="2.4">SOFTWARE ENGINEER</text>
    <text class="sans primary" x="0" y="70" font-size="48" font-weight="700" letter-spacing="-1.5">Gerard Zhou</text>
    <text class="sans secondary" x="0" y="108" font-size="20">Computer Science @ UT Austin</text>
    <text class="sans primary" x="0" y="156" font-size="18" font-weight="600">Backend Systems · Cloud Infrastructure</text>
    <text class="sans primary" x="0" y="184" font-size="18" font-weight="600">Developer Tooling</text>
  </g>

  <g transform="translate(28 262)">
    <rect class="panel" width="624" height="278" rx="14" />
    <circle cx="24" cy="24" r="5" fill="#ff5f56" />
    <circle cx="42" cy="24" r="5" fill="#ffbd2e" />
    <circle cx="60" cy="24" r="5" fill="#27c93f" />
    <text class="mono secondary" x="86" y="29" font-size="14">systems.profile</text>
    <path class="grid" d="M0 48H624" />
    <text class="mono green" x="24" y="84" font-size="16">$</text>
    <text class="mono primary" x="48" y="84" font-size="16">inspect --engineer gerard</text>
    <rect class="cursor accent" x="300" y="69" width="9" height="18" rx="1" />
    <text class="mono accent" x="24" y="126" font-size="16">platform</text>
    <text class="mono secondary" x="144" y="126" font-size="16">Kubernetes · OpenShift · Helm · Operator SDK</text>
    <text class="mono accent" x="24" y="166" font-size="16">backend</text>
    <text class="mono secondary" x="144" y="166" font-size="16">Go · Python · TypeScript · Node.js · Express</text>
    <text class="mono accent" x="24" y="206" font-size="16">data</text>
    <text class="mono secondary" x="144" y="206" font-size="16">PostgreSQL · Redis · MongoDB · SQL</text>
    <text class="mono accent" x="24" y="246" font-size="16">infra/cloud</text>
    <text class="mono secondary" x="144" y="246" font-size="16">Terraform · AWS · Cloudflare · Docker</text>
  </g>
</svg>
