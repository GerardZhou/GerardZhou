<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title description">
  <title id="title">Gerard Zhou — Software Engineer</title>
  <desc id="description">A restrained terminal-inspired header describing work across infrastructure, backend systems, and developer tools.</desc>
  <style>
    :root {
      color-scheme: light dark;
    }

    .surface { fill: #f6f8fa; }
    .panel { fill: #ffffff; stroke: #d0d7de; }
    .grid { stroke: #d8dee4; }
    .primary { fill: #1f2328; }
    .secondary { fill: #59636e; }
    .accent { fill: #0969da; }
    .green { fill: #1a7f37; }
    .amber { fill: #9a6700; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .cursor { animation: blink 1.2s steps(1, end) infinite; }

    @keyframes blink {
      0%, 46% { opacity: 1; }
      47%, 100% { opacity: 0; }
    }

    @media (prefers-color-scheme: dark) {
      .surface { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; }
      .grid { stroke: #21262d; }
      .primary { fill: #f0f6fc; }
      .secondary { fill: #8b949e; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .amber { fill: #d29922; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
    }
  </style>

  <rect class="surface" width="1200" height="320" rx="24" />

  <g opacity="0.5">
    <path class="grid" d="M0 80H1200M0 160H1200M0 240H1200" />
    <path class="grid" d="M100 0V320M300 0V320M500 0V320M700 0V320M900 0V320M1100 0V320" />
  </g>

  <g transform="translate(64 64)">
    <text class="sans accent" x="0" y="12" font-size="15" font-weight="700" letter-spacing="2.4">SOFTWARE ENGINEER</text>
    <text class="sans primary" x="0" y="72" font-size="52" font-weight="700" letter-spacing="-1.5">Gerard Zhou</text>
    <text class="sans secondary" x="0" y="111" font-size="20">Computer Science @ UT Austin</text>
    <text class="sans primary" x="0" y="157" font-size="18" font-weight="600">Infrastructure · Backend Systems · Developer Tools</text>
    <text class="sans secondary" x="0" y="188" font-size="16">Build carefully. Measure honestly. Ship useful systems.</text>
  </g>

  <g transform="translate(676 44)">
    <rect class="panel" width="464" height="232" rx="14" />
    <circle cx="24" cy="24" r="5" fill="#ff5f56" />
    <circle cx="42" cy="24" r="5" fill="#ffbd2e" />
    <circle cx="60" cy="24" r="5" fill="#27c93f" />
    <text class="mono secondary" x="86" y="29" font-size="12">systems.profile</text>
    <path class="grid" d="M0 46H464" />

    <text class="mono green" x="24" y="78" font-size="14">$</text>
    <text class="mono primary" x="44" y="78" font-size="14">inspect --engineer gerard</text>

    <text class="mono accent" x="24" y="112" font-size="13">infra</text>
    <text class="mono secondary" x="100" y="112" font-size="13">Kubernetes · Terraform · Cloudflare</text>

    <text class="mono accent" x="24" y="142" font-size="13">backend</text>
    <text class="mono secondary" x="100" y="142" font-size="13">Go · TypeScript · Python · Node.js</text>

    <text class="mono accent" x="24" y="172" font-size="13">quality</text>
    <text class="mono secondary" x="100" y="172" font-size="13">tests · static analysis · release safety</text>

    <text class="mono amber" x="24" y="208" font-size="13">status</text>
    <text class="mono primary" x="100" y="208" font-size="13">building reliable systems</text>
    <rect class="cursor accent" x="331" y="196" width="8" height="15" rx="1" />
  </g>
</svg>
